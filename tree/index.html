<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tree Planting Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background-color: #1a1512;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f5f0eb;
            touch-action: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #fps-counter {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(26, 21, 18, 0.7);
            color: #4ade80;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(224, 180, 140, 0.3);
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            z-index: 20;
            pointer-events: none;
        }

        #money-counter {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(26, 21, 18, 0.75);
            backdrop-filter: blur(8px);
            color: #22c55e;
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid rgba(34, 197, 94, 0.3);
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            z-index: 20;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(245, 240, 235, 0.8);
        }

        #crosshair::before {
            top: 4px;
            left: 0;
            width: 10px;
            height: 2px;
        }

        #crosshair::after {
            top: 0;
            left: 4px;
            width: 2px;
            height: 10px;
        }

        #instructions-mini {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(45, 38, 34, 0.7);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(224, 180, 140, 0.15);
            font-size: 0.85rem;
            color: #d5c8be;
            z-index: 5;
            pointer-events: none;
            letter-spacing: 0.5px;
            display: none;
        }

        /* Mobile Controls UI - Hidden by default */
        #mobile-ui {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        body.is-touch #mobile-ui {
            display: block;
        }

        body.is-touch #instructions-mini {
            display: none !important;
        }

        #joystick-zone {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 140px;
            height: 140px;
            background: rgba(45, 38, 34, 0.4);
            border: 2px solid rgba(224, 180, 140, 0.3);
            border-radius: 50%;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #joystick-stick {
            width: 60px;
            height: 60px;
            background: rgba(224, 180, 140, 0.8);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .action-btn {
            position: absolute;
            background: rgba(45, 38, 34, 0.6);
            border: 2px solid rgba(224, 180, 140, 0.5);
            color: #e0b48c;
            border-radius: 50%;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: background 0.1s;
        }

        .action-btn:active {
            background: rgba(224, 180, 140, 0.4);
        }

        #jump-btn {
            bottom: 65px;
            right: 65px;
            width: 70px;
            height: 70px;
        }

        #flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: red;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.15s ease-out;
        }
    </style>
</head>

<body>
    <div id="flash-overlay"></div>
    <div id="fps-counter">FPS: 0</div>
    <div id="money-counter">$0.00</div>
    <div id="canvas-container"></div>

    <div id="crosshair"></div>
    <div id="instructions-mini">Click screen to lock cursor • Press ESC to unlock</div>

    <!-- Mobile UI Elements -->
    <div id="mobile-ui">
        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>
        <div id="jump-btn" class="action-btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const isMobile = /Mobi|Android|iPhone|iPad|iPod|Windows Phone|webOS|BlackBerry|Opera Mini/i.test(navigator.userAgent);
        const isComputer = !isMobile;
        const isTouchDevice = (('ontouchstart' in window) || (navigator.maxTouchPoints > 0)) && !isComputer;
        if (isTouchDevice) {
            document.body.classList.add('is-touch');
        }

        // PointerLockControls implementation directly inline
        class PointerLockControls {
            constructor(camera, domElement) {
                this.camera = camera;
                this.domElement = domElement || document.body;
                this.isLocked = false;

                this.changeEvent = { type: 'change' };
                this.lockEvent = { type: 'lock' };
                this.unlockEvent = { type: 'unlock' };

                this.euler = new THREE.Euler(0, 0, 0, 'YXZ');

                this.onMouseMove = this.onMouseMove.bind(this);
                this.onPointerlockChange = this.onPointerlockChange.bind(this);

                this.connect();
            }

            rotateCamera(deltaX, deltaY) {
                this.euler.setFromQuaternion(this.camera.quaternion);

                this.euler.y -= deltaX;
                this.euler.x -= deltaY;

                // Restrict looking straight up or down
                this.euler.x = Math.max(Math.PI / 2 - Math.PI + 0.01, Math.min(Math.PI / 2 - 0.01, this.euler.x));

                this.camera.quaternion.setFromEuler(this.euler);
                this.dispatchEvent(this.changeEvent);
            }

            onMouseMove(event) {
                if (this.isLocked === false) return;

                const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
                const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;

                this.rotateCamera(movementX * 0.002, movementY * 0.002);
            }

            onPointerlockChange() {
                if (this.domElement.ownerDocument.pointerLockElement === this.domElement) {
                    this.dispatchEvent(this.lockEvent);
                    this.isLocked = true;
                } else {
                    this.dispatchEvent(this.unlockEvent);
                    this.isLocked = false;
                }
            }

            connect() {
                this.domElement.ownerDocument.addEventListener('mousemove', this.onMouseMove);
                this.domElement.ownerDocument.addEventListener('pointerlockchange', this.onPointerlockChange);
            }

            lock() {
                this.domElement.requestPointerLock();
            }

            addEventListener(type, listener) {
                if (this._listeners === undefined) this._listeners = {};
                const listeners = this._listeners;
                if (listeners[type] === undefined) {
                    listeners[type] = [];
                }
                if (listeners[type].indexOf(listener) === -1) {
                    listeners[type].push(listener);
                }
            }

            dispatchEvent(event) {
                if (this._listeners === undefined) return;
                const listeners = this._listeners;
                const listenerArray = listeners[event.type];
                if (listenerArray !== undefined) {
                    event.target = this;
                    const array = listenerArray.slice(0);
                    for (let i = 0, l = array.length; i < l; i++) {
                        array[i].call(this, event);
                    }
                    event.target = null;
                }
            }
        }

        // --- App Setup ---
        let scene, camera, renderer, controls, rotor, tailRotor, helicopterGroup, heliAssembly, shovel;
        let shovelSwingProgress = 1.0;
        let swingType = 'dig'; // 'dig' or 'overhand'
        let heliState = 'none'; // 'none', 'fly_in', 'landing', 'unloading', 'fly_away'
        let heliTimer = 0;
        const container = document.getElementById('canvas-container');
        const crosshair = document.getElementById('crosshair');
        const fpsCounter = document.getElementById('fps-counter');
        const instructionsMini = document.getElementById('instructions-mini');
        let moneyCount = 0.00;
        const moneyCounter = document.getElementById('money-counter');

        // Collision & Movement variables
        let collidableBoxes = [];
        let plantedTrees = [];
        let inspector = null;
        let inspectorHealth = 5;
        let inspectorMaxHealth = 5;
        let inspectorSpeed = 5.5; // Walk speed is slightly slower than player so they can run/fight
        let inspectorHitCooldown = 0; // seconds
        const moveState = { forward: false, backward: false, left: false, right: false };
        let joystickDir = { x: 0, z: 0 };
        let joystickActive = false;

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();
        let canJump = false;

        // FPS tracking
        let frames = 0;
        let lastFpsTime = performance.now();

        // Map Size
        const planeSize = 150;
        const mapBound = 49;

        // PERFORMANCE OPTIMIZATION: Freezes matrix calculations for static objects
        function freezeObject(obj) {
            obj.updateMatrixWorld(true);
            obj.traverse((child) => {
                child.matrixAutoUpdate = false;
            });
        }

        function init() {
            // Scene & Sky Color
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Sky blue
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.008);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 20);
            scene.add(camera);

            // Create and position the colorful Voxel Shovel
            window.createVoxelShovel = function() {
                const shovelGrp = new THREE.Group();
                const voxelSize = 0.015;
                const voxelGeo = new THREE.BoxGeometry(voxelSize, voxelSize, voxelSize);

                // Updated voxel materials
                const colors = {
                    lightGrey: new THREE.MeshStandardMaterial({ color: 0xd0d0d0, roughness: 0.3, metalness: 0.5 }),
                    black: new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.6, metalness: 0.1 }),
                    pink: new THREE.MeshStandardMaterial({ color: 0xff69b4, roughness: 0.4, metalness: 0.1 })
                };

                const voxels = [];

                // 1. Blade (Y: 0 to 6) - Light Grey
                voxels.push({ x: 0, y: 0, z: 0, mat: colors.lightGrey });
                for (let x = -1; x <= 1; x++) voxels.push({ x, y: 1, z: 0, mat: colors.lightGrey });
                for (let x = -2; x <= 2; x++) voxels.push({ x, y: 2, z: 0, mat: colors.lightGrey });
                for (let x = -2; x <= 2; x++) voxels.push({ x, y: 3, z: 0, mat: colors.lightGrey });
                for (let x = -2; x <= 2; x++) voxels.push({ x, y: 4, z: 0, mat: colors.lightGrey });
                for (let x = -3; x <= 3; x++) voxels.push({ x, y: 5, z: 0, mat: colors.lightGrey });
                for (let x = -3; x <= 3; x++) voxels.push({ x, y: 6, z: 0, mat: colors.lightGrey });

                // 2. Connector / Collar area (Y: 7 to 9)
                // Y: 7 and 8 - Grey and thicker (5-voxel cross structure)
                for (let y = 7; y <= 8; y++) {
                    voxels.push({ x: 0, y, z: 0, mat: colors.lightGrey });
                    voxels.push({ x: 1, y, z: 0, mat: colors.lightGrey });
                    voxels.push({ x: -1, y, z: 0, mat: colors.lightGrey });
                    voxels.push({ x: 0, y, z: 1, mat: colors.lightGrey });
                    voxels.push({ x: 0, y, z: -1, mat: colors.lightGrey });
                }
                // Y: 9 - Pink and thin
                voxels.push({ x: 0, y: 9, z: 0, mat: colors.pink });

                // 3. Shaft (Y: 10 to 20) - Black and slightly thinner (2x2 square structure)
                for (let y = 10; y <= 20; y++) {
                    voxels.push({ x: 0, y, z: 0, mat: colors.black });
                    voxels.push({ x: 0, y, z: -1, mat: colors.black });
                    voxels.push({ x: -1, y, z: 0, mat: colors.black });
                    voxels.push({ x: -1, y, z: -1, mat: colors.black });
                }

                // 4. D-Grip (Y: 21 to 25) - Black and slightly thinner
                // Grip base
                for (let x = -2; x <= 2; x++) {
                    for (let z = -1; z <= 0; z++) {
                        voxels.push({ x, y: 21, z, mat: colors.black });
                    }
                }
                // Grip sides
                for (let y = 22; y <= 24; y++) {
                    for (let z = -1; z <= 0; z++) {
                        voxels.push({ x: -2, y, z, mat: colors.black });
                        voxels.push({ x: 2, y, z, mat: colors.black });
                    }
                }
                // Grip top
                for (let x = -2; x <= 2; x++) {
                    for (let z = -1; z <= 0; z++) {
                        voxels.push({ x, y: 25, z, mat: colors.black });
                    }
                }

                // Create individual voxel meshes
                voxels.forEach(v => {
                    const mesh = new THREE.Mesh(voxelGeo, v.mat);
                    // Flip the Y coordinate (25 - v.y) to point the blade up
                    mesh.position.set(v.x * voxelSize, ((25 - v.y) - 12) * voxelSize, v.z * voxelSize);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    shovelGrp.add(mesh);
                });

                return shovelGrp;
            };

            shovel = createVoxelShovel();
            camera.add(shovel);

            // Initial scale & offset relative to camera (first-person) - positioned to make entire handle visible
            shovel.position.set(0.18, -0.20, -0.52);
            shovel.rotation.set(-0.15, -0.55, 0.4);

            // Renderer (Added high-performance preference)
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
            hemiLight.position.set(0, 200, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffe5cc, 0.8);
            dirLight.position.set(50, 100, 50);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 100;
            dirLight.shadow.camera.bottom = -100;
            dirLight.shadow.camera.left = -100;
            dirLight.shadow.camera.right = 100;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // --- Terrain / Ground Plane ---
            const planeGeo = new THREE.PlaneGeometry(planeSize, planeSize);
            const planeMat = new THREE.MeshStandardMaterial({ color: 0xc69469, roughness: 0.8, metalness: 0.1 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.receiveShadow = true;
            scene.add(plane);
            freezeObject(plane);

            // Grid scale reduced to match plane size
            const gridHelper = new THREE.GridHelper(planeSize, 30, 0x8a5b32, 0xa57548);
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);
            freezeObject(gridHelper);

            // --- Flying Helicopter Assembly ---
            helicopterGroup = new THREE.Group();

            heliAssembly = new THREE.Group();

            const prismGeo = new THREE.BoxGeometry(2, 2, 6);
            const prismMat = new THREE.MeshStandardMaterial({
                color: 0xb0b8c0,
                roughness: 0.4,
                metalness: 0.6
            });
            const prism = new THREE.Mesh(prismGeo, prismMat);
            prism.castShadow = true;
            prism.receiveShadow = true;
            heliAssembly.add(prism);

            // Main Rotor
            const rotorGeo = new THREE.BoxGeometry(8, 0.1, 0.4);
            const rotorMat = new THREE.MeshStandardMaterial({
                color: 0x333333,
                roughness: 0.6,
                metalness: 0.4
            });
            rotor = new THREE.Mesh(rotorGeo, rotorMat);
            rotor.position.set(0, 1.2, 0);
            rotor.castShadow = true;
            rotor.receiveShadow = true;
            heliAssembly.add(rotor);

            // Windows / Cockpit windshield (moved to +3.5 z, facing the opposite direction)
            const cockpitGeo = new THREE.BoxGeometry(1.8, 1.2, 1.6);
            const cockpitMat = new THREE.MeshStandardMaterial({
                color: 0x112233,
                roughness: 0.1,
                metalness: 0.9,
                transparent: true,
                opacity: 0.75
            });
            const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
            cockpit.position.set(0, 0.4, 3.5);
            cockpit.castShadow = true;
            cockpit.receiveShadow = true;
            heliAssembly.add(cockpit);

            // Second lower window (translucent rectangular prism directly below the main window)
            const lowerCockpitGeo = new THREE.BoxGeometry(1.5, 0.6, 1.2);
            const lowerCockpit = new THREE.Mesh(lowerCockpitGeo, cockpitMat);
            lowerCockpit.position.set(0, -0.6, 3.5);
            lowerCockpit.castShadow = true;
            lowerCockpit.receiveShadow = true;
            heliAssembly.add(lowerCockpit);

            // Tail Boom (moved to front at -4.5 z)
            const tailBoomGeo = new THREE.BoxGeometry(0.4, 0.4, 4);
            const tailBoom = new THREE.Mesh(tailBoomGeo, prismMat);
            tailBoom.position.set(0, 0.2, -4.5);
            tailBoom.castShadow = true;
            tailBoom.receiveShadow = true;
            heliAssembly.add(tailBoom);

            // Tail Fin (moved to front at -6.1 z)
            const tailFinGeo = new THREE.BoxGeometry(0.15, 1.6, 0.8);
            const tailFin = new THREE.Mesh(tailFinGeo, prismMat);
            tailFin.position.set(0, 1.0, -6.1);
            tailFin.castShadow = true;
            tailFin.receiveShadow = true;
            heliAssembly.add(tailFin);

            // Tail Rotor (moved to front at -6.1 z)
            const tailRotorGeo = new THREE.BoxGeometry(0.05, 1.8, 0.15);
            const tailRotorMat = new THREE.MeshStandardMaterial({
                color: 0x333333,
                roughness: 0.6,
                metalness: 0.4
            });
            tailRotor = new THREE.Mesh(tailRotorGeo, tailRotorMat);
            tailRotor.position.set(0.2, 1.2, -6.1);
            tailRotor.castShadow = true;
            tailRotor.receiveShadow = true;
            heliAssembly.add(tailRotor);

            heliAssembly.rotation.x = 0.15;
            heliAssembly.rotation.z = 0.35;

            helicopterGroup.add(heliAssembly);
            // Helicopter will be added to the scene when triggered by tree planting

            // Green Patches
            const patchMat = new THREE.MeshStandardMaterial({ color: 0x5e7c56, roughness: 0.9, metalness: 0.0 });
            for (let i = 0; i < 25; i++) {
                const radius = 2 + Math.random() * 8;
                const segments = 5 + Math.floor(Math.random() * 4);
                const patchGeo = new THREE.CircleGeometry(radius, segments);
                const patch = new THREE.Mesh(patchGeo, patchMat);
                patch.position.set((Math.random() - 0.5) * 90, 0.005, (Math.random() - 0.5) * 90);
                patch.rotation.x = -Math.PI / 2;
                patch.rotation.z = Math.random() * Math.PI * 2;
                patch.receiveShadow = true;
                scene.add(patch);
                freezeObject(patch);
            }

            // Spruce Tree logic
            window.createSpruceTree = function (foliageColor) {
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 2, 5), new THREE.MeshStandardMaterial({ color: 0x6e473b, roughness: 0.9, flatShading: true }));
                trunk.position.y = 1;
                trunk.castShadow = true;
                trunk.receiveShadow = true;
                tree.add(trunk);

                const leafColor = foliageColor !== undefined ? foliageColor : 0x2e4f3b;
                const foliageMat = new THREE.MeshStandardMaterial({ color: leafColor, roughness: 0.9, flatShading: true });
                const coneHeights = [1.8, 1.4, 1.0], coneRadii = [1.2, 0.9, 0.6], coneY = [2.2, 3.1, 3.8];
                for (let i = 0; i < 3; i++) {
                    const cone = new THREE.Mesh(new THREE.ConeGeometry(coneRadii[i], coneHeights[i], 5), foliageMat);
                    cone.position.y = coneY[i];
                    cone.castShadow = true;
                    cone.receiveShadow = true;
                    tree.add(cone);
                }
                return tree;
            };

            // Random initial trees inside the boundaries
            for (let i = 0; i < 15; i++) {
                const tree = createSpruceTree();
                tree.position.set((Math.random() - 0.5) * 80, 0, (Math.random() - 0.5) * 80);
                const scale = 0.8 + Math.random() * 0.5;
                tree.scale.set(scale, scale, scale);
                tree.rotation.y = Math.random() * Math.PI;
                scene.add(tree);
                freezeObject(tree);
            }

            // --- TALL BORDER TREES ---
            const borderSpacing = 3;
            const extraLayers = 4;

            for (let layer = 0; layer <= extraLayers; layer++) {
                const offset = layer * borderSpacing;
                const currentZTop = -mapBound - offset;
                const currentZBottom = mapBound + offset;
                const currentXLeft = -mapBound - offset;
                const currentXRight = mapBound + offset;

                const xStart = -mapBound - offset;
                const xEnd = mapBound + offset;

                for (let x = xStart; x <= xEnd; x += borderSpacing) {
                    let treeTop = createSpruceTree();
                    treeTop.position.set(x + (Math.random() - 0.5), 0, currentZTop + (Math.random() - 0.5));
                    treeTop.scale.set(1.5 + Math.random() * 0.5, 3 + Math.random() * 1.5, 1.5 + Math.random() * 0.5);
                    treeTop.rotation.y = Math.random() * Math.PI;
                    scene.add(treeTop);
                    freezeObject(treeTop);

                    let treeBottom = createSpruceTree();
                    treeBottom.position.set(x + (Math.random() - 0.5), 0, currentZBottom + (Math.random() - 0.5));
                    treeBottom.scale.set(1.5 + Math.random() * 0.5, 3 + Math.random() * 1.5, 1.5 + Math.random() * 0.5);
                    treeBottom.rotation.y = Math.random() * Math.PI;
                    scene.add(treeBottom);
                    freezeObject(treeBottom);
                }

                const zStart = currentZTop + borderSpacing;
                const zEnd = currentZBottom - borderSpacing;

                for (let z = zStart; z <= zEnd; z += borderSpacing) {
                    let treeLeft = createSpruceTree();
                    treeLeft.position.set(currentXLeft + (Math.random() - 0.5), 0, z + (Math.random() - 0.5));
                    treeLeft.scale.set(1.5 + Math.random() * 0.5, 3 + Math.random() * 1.5, 1.5 + Math.random() * 0.5);
                    treeLeft.rotation.y = Math.random() * Math.PI;
                    scene.add(treeLeft);
                    freezeObject(treeLeft);

                    let treeRight = createSpruceTree();
                    treeRight.position.set(currentXRight + (Math.random() - 0.5), 0, z + (Math.random() - 0.5));
                    treeRight.scale.set(1.5 + Math.random() * 0.5, 3 + Math.random() * 1.5, 1.5 + Math.random() * 0.5);
                    treeRight.rotation.y = Math.random() * Math.PI;
                    scene.add(treeRight);
                    freezeObject(treeRight);
                }
            }

            // --- PERFORMANCE OPTIMIZED SCATTERED LOGS & STICKS ---
            const logGeo = new THREE.CylinderGeometry(0.2, 0.2, 3.5, 6);
            const stickGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.5, 5);

            const brownMat = new THREE.MeshStandardMaterial({ color: 0x4a2c11, roughness: 0.9, flatShading: true });
            const stickMat = new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 1.0, flatShading: true });

            const logCount = 100;
            const stickCount = 1000;

            // InstancedMesh groups all logs/sticks into a single massive draw call each, hugely boosting FPS
            const logInstanced = new THREE.InstancedMesh(logGeo, brownMat, logCount);
            logInstanced.castShadow = true;
            logInstanced.receiveShadow = true;

            const stickInstanced = new THREE.InstancedMesh(stickGeo, stickMat, stickCount);
            stickInstanced.castShadow = true;
            stickInstanced.receiveShadow = true;

            const dummyObj = new THREE.Object3D();
            const collisionMeshCalculator = new THREE.Mesh(logGeo, brownMat);

            // Add 100 Brown Logs to InstancedMesh
            for (let i = 0; i < logCount; i++) {
                dummyObj.position.set((Math.random() - 0.5) * 85, 0.2, (Math.random() - 0.5) * 85);
                dummyObj.rotation.set(0, Math.random() * Math.PI * 2, Math.PI / 2);
                dummyObj.updateMatrix();
                logInstanced.setMatrixAt(i, dummyObj.matrix);

                // Calculate and store collision bounding box mathematically based on position
                collisionMeshCalculator.position.copy(dummyObj.position);
                collisionMeshCalculator.rotation.copy(dummyObj.rotation);
                collisionMeshCalculator.updateMatrixWorld(true);
                collidableBoxes.push(new THREE.Box3().setFromObject(collisionMeshCalculator));
            }
            scene.add(logInstanced);
            freezeObject(logInstanced);

            // Add 1000 Smaller Sticks to InstancedMesh
            for (let i = 0; i < stickCount; i++) {
                dummyObj.position.set((Math.random() - 0.5) * 85, 0.05, (Math.random() - 0.5) * 85);
                dummyObj.rotation.set(0, Math.random() * Math.PI * 2, Math.PI / 2);
                dummyObj.updateMatrix();
                stickInstanced.setMatrixAt(i, dummyObj.matrix);
            }
            scene.add(stickInstanced);
            freezeObject(stickInstanced);

            controls = new PointerLockControls(camera, renderer.domElement);

            if (!isTouchDevice) {
                instructionsMini.style.display = 'block';
                instructionsMini.innerText = "Click screen to lock • WASD to move • Space to jump";

                controls.addEventListener('lock', () => {
                    crosshair.style.display = 'block';
                    instructionsMini.style.display = 'block';
                    instructionsMini.innerText = "Press ESC to unlock cursor";
                });

                controls.addEventListener('unlock', () => {
                    crosshair.style.display = 'none';
                    instructionsMini.style.display = 'block';
                    instructionsMini.innerText = "Click screen to lock • WASD to move • Space to jump";
                });
            } else {
                crosshair.style.display = 'block';
            }

            document.addEventListener('click', (event) => {
                if (isTouchDevice) return;

                if (controls.isLocked) {
                    plantTreeAction();
                } else {
                    controls.lock();
                }
            });

            setupTouchControls();

            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function triggerHeliArrival() {
            heliState = 'fly_in';

            helicopterGroup.position.set(80, 30, 80);
            helicopterGroup.lookAt(0, 15, 0);

        function spawnInspectorAction() {
            inspector = createInspector();
            // Spawn at the middle where the helicopter lands, slightly offset
            inspector.position.set(2, 0, 2);
            scene.add(inspector);
            
            inspectorHealth = 5;
            inspectorHitCooldown = 0;
        }

        function damageInspector() {
            if (!inspector || inspectorHealth <= 0) return;
            
            inspectorHealth -= 1;
            
            const pushDir = inspector.position.clone().sub(camera.position);
            pushDir.y = 0;
            pushDir.normalize();
            inspector.position.addScaledVector(pushDir, 2.0);
            
            inspector.userData.materials.forEach(mat => {
                mat.color.setHex(0xff0000);
            });
            
            setTimeout(() => {
                if (inspector && inspectorHealth > 0) {
                    inspector.userData.materials.forEach((mat, idx) => {
                        mat.color.setHex(inspector.userData.originalColors[idx]);
                    });
                }
            }, 200);
            
            if (inspectorHealth <= 0) {
                const deathInterval = setInterval(() => {
                    if (inspector) {
                        inspector.scale.y -= 0.1;
                        inspector.scale.x -= 0.1;
                        inspector.scale.z -= 0.1;
                        if (inspector.scale.y <= 0.1) {
                            clearInterval(deathInterval);
                            scene.remove(inspector);
                            inspector = null;
                        }
                    } else {
                        clearInterval(deathInterval);
                    }
                }, 30);
            }
        }

        function plantTreeAction(touchX, touchY) {
            let hitInspector = false;
            if (inspector) {
                const distToInspector = camera.position.distanceTo(inspector.position);
                if (distToInspector < 10) {
                    const toInspector = inspector.position.clone().sub(camera.position).normalize();
                    const forwardVec = new THREE.Vector3();
                    camera.getWorldDirection(forwardVec);
                    const dot = forwardVec.dot(toInspector);
                    if (dot > 0.5) {
                        damageInspector();
                        hitInspector = true;
                    }
                }
            }

            if (hitInspector) {
                swingType = 'overhand';
                shovelSwingProgress = 0.0;
                return;
            }

            swingType = 'dig';
            shovelSwingProgress = 0.0;

            const raycaster = new THREE.Raycaster();
            const pointer = new THREE.Vector2();

            if (touchX !== undefined && touchY !== undefined) {
                pointer.x = (touchX / window.innerWidth) * 2 - 1;
                pointer.y = -(touchY / window.innerHeight) * 2 + 1;
            } else {
                pointer.x = 0;
                pointer.y = 0;
            }

            raycaster.setFromCamera(pointer, camera);

            const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const intersectionPoint = new THREE.Vector3();

            if (raycaster.ray.intersectPlane(groundPlane, intersectionPoint)) {
                if (camera.position.distanceTo(intersectionPoint) < 10) {
                    const tree = createSpruceTree(0x3d6b50);
                    tree.position.copy(intersectionPoint);
                    const scale = 0.2 + Math.random() * 0.1;
                    tree.scale.set(scale * 0.75, scale, scale * 0.75);
                    tree.rotation.y = Math.random() * Math.PI;
                    scene.add(tree);

                    // Freeze newly planted tree to keep performance high
                    freezeObject(tree);

                    // Check distance to other planted trees
                    let spawnInspector = false;
                    for (let i = 0; i < plantedTrees.length; i++) {
                        const dist = tree.position.distanceTo(plantedTrees[i].position);
                        if (dist < 1.0) {
                            spawnInspector = true;
                        }
                    }
                    plantedTrees.push({ position: tree.position.clone() });

                    if (spawnInspector && !inspector && heliState === 'none') {
                        triggerHeliArrival();
                    }

                    // Update money counter
                    moneyCount += 0.13;
                    moneyCounter.innerText = `$${moneyCount.toFixed(2)}`;

                    // Pop effect for visual feedback
                    moneyCounter.style.transform = 'scale(1.15)';
                    setTimeout(() => {
                        moneyCounter.style.transform = 'scale(1.0)';
                    }, 100);
                }
            }
        }

        // --- Touch Interactions ---
        function setupTouchControls() {
            if (!isTouchDevice) return;

            const joystickZone = document.getElementById('joystick-zone');
            const joystickStick = document.getElementById('joystick-stick');
            const jumpBtn = document.getElementById('jump-btn');

            let joystickTouchId = null;
            let lookTouchId = null;
            let lastLookX = 0;
            let lastLookY = 0;

            let lookTouchStartX = 0;
            let lookTouchStartY = 0;
            let lookTouchStartTime = 0;

            function updateJoystick(touch) {
                const rect = joystickZone.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                let deltaX = touch.clientX - centerX;
                let deltaY = touch.clientY - centerY;

                const maxDist = rect.width / 2;
                const distance = Math.min(maxDist, Math.sqrt(deltaX * deltaX + deltaY * deltaY));
                const angle = Math.atan2(deltaY, deltaX);

                const stickX = Math.cos(angle) * distance;
                const stickY = Math.sin(angle) * distance;

                joystickStick.style.transform = `translate(${stickX}px, ${stickY}px)`;

                joystickDir.x = stickX / maxDist;
                joystickDir.z = stickY / maxDist;
            }

            document.addEventListener('touchstart', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    const targetId = touch.target.id;

                    if (targetId === 'joystick-zone' || targetId === 'joystick-stick') {
                        joystickTouchId = touch.identifier;
                        joystickActive = true;
                        updateJoystick(touch);
                    }
                    else if (targetId === 'jump-btn') {
                        if (canJump) { velocity.y += 10.0; canJump = false; }
                    }
                    else if (lookTouchId === null) {
                        lookTouchId = touch.identifier;
                        lastLookX = touch.clientX;
                        lastLookY = touch.clientY;

                        lookTouchStartX = touch.clientX;
                        lookTouchStartY = touch.clientY;
                        lookTouchStartTime = performance.now();
                    }
                }
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];

                    if (touch.identifier === joystickTouchId) {
                        updateJoystick(touch);
                    }
                    else if (touch.identifier === lookTouchId) {
                        const deltaX = touch.clientX - lastLookX;
                        const deltaY = touch.clientY - lastLookY;

                        controls.rotateCamera(deltaX * 0.005, deltaY * 0.005);

                        lastLookX = touch.clientX;
                        lastLookY = touch.clientY;
                    }
                }
            }, { passive: false });

            document.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];

                    if (touch.identifier === joystickTouchId) {
                        joystickActive = false;
                        joystickTouchId = null;
                        joystickDir = { x: 0, z: 0 };
                        joystickStick.style.transform = `translate(0px, 0px)`;
                    }
                    else if (touch.identifier === lookTouchId) {
                        const touchDuration = performance.now() - lookTouchStartTime;
                        const moveDist = Math.hypot(touch.clientX - lookTouchStartX, touch.clientY - lookTouchStartY);

                        if (touchDuration < 250 && moveDist < 15) {
                            plantTreeAction(touch.clientX, touch.clientY);
                        }

                        lookTouchId = null;
                    }
                }
            });
        }

        function onKeyDown(event) {
            switch (event.code) {
                case 'KeyW': case 'ArrowUp': moveState.forward = true; break;
                case 'KeyS': case 'ArrowDown': moveState.backward = true; break;
                case 'KeyA': case 'ArrowLeft': moveState.left = true; break;
                case 'KeyD': case 'ArrowRight': moveState.right = true; break;
                case 'Space': if (canJump) { velocity.y += 10.0; canJump = false; } break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'KeyW': case 'ArrowUp': moveState.forward = false; break;
                case 'KeyS': case 'ArrowDown': moveState.backward = false; break;
                case 'KeyA': case 'ArrowLeft': moveState.left = false; break;
                case 'KeyD': case 'ArrowRight': moveState.right = false; break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Helper function for collision checking
        function isColliding(nextX, nextZ, currentY) {
            const playerRadius = 0.3;
            const playerHeight = 1.6;
            const feetY = currentY - playerHeight;

            const playerBox = new THREE.Box3(
                new THREE.Vector3(nextX - playerRadius, feetY, nextZ - playerRadius),
                new THREE.Vector3(nextX + playerRadius, currentY, nextZ + playerRadius)
            );

            for (let i = 0; i < collidableBoxes.length; i++) {
                if (playerBox.intersectsBox(collidableBoxes[i])) {
                    return true;
                }
            }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            const flightRadius = 30; // Circle radius
            const flightSpeed = 0.0008; // Speed of circular motion
            const flightHeight = 8; // Slightly lower, just above the treeline

            const angle = time * flightSpeed;
            const revs = angle / (2 * Math.PI);
            const displayRevs = Math.min(3, Math.floor(revs));

            // --- FPS Counter Update ---
            frames++;
            if (time >= lastFpsTime + 1000) {
                let statusText = "";
                if (inspector) {
                    statusText = "<br>Status: INSPECTOR ACTIVE!";
                } else if (heliState === 'fly_in') {
                    statusText = "<br>Status: HELICOPTER INBOUND";
                } else if (heliState === 'landing') {
                    statusText = "<br>Status: HELICOPTER LANDING";
                } else if (heliState === 'unloading') {
                    statusText = "<br>Status: DEPLOYING INSPECTOR";
                } else if (heliState === 'fly_away') {
                    statusText = "<br>Status: HELICOPTER DEPARTING";
                } else {
                    statusText = "<br>Status: Normal";
                }
                fpsCounter.innerHTML = `FPS: ${frames}${statusText}`;
                frames = 0;
                lastFpsTime = time;
            }

            let rotorSpeedMultiplier = 1.0;
            let tailRotorSpeedMultiplier = 1.0;

            if (heliState !== 'none' && helicopterGroup) {
                heliTimer += delta;
                
                if (heliState === 'fly_in') {
                    const duration = 4.0;
                    const t = Math.min(1.0, heliTimer / duration);
                    const smoothT = t * t * (3 - 2 * t);
                    
                    helicopterGroup.position.lerpVectors(
                        new THREE.Vector3(80, 30, 80),
                        new THREE.Vector3(0, 15, 0),
                        smoothT
                    );
                    
                    if (heliAssembly) {
                        heliAssembly.rotation.x = 0.2;
                        heliAssembly.rotation.z = 0.1;
                    }
                    helicopterGroup.lookAt(0, 15, 0);
                    
                    if (t >= 1.0) {
                        heliState = 'landing';
                        heliTimer = 0;
                    }
                } 
                else if (heliState === 'landing') {
                    const duration = 3.0;
                    const t = Math.min(1.0, heliTimer / duration);
                    const smoothT = t * t * (3 - 2 * t);
                    
                    helicopterGroup.position.lerpVectors(
                        new THREE.Vector3(0, 15, 0),
                        new THREE.Vector3(0, 1.0, 0),
                        smoothT
                    );
                    
                    if (heliAssembly) {
                        heliAssembly.rotation.x = 0.2 * (1 - smoothT);
                        heliAssembly.rotation.z = 0.1 * (1 - smoothT);
                    }
                    
                    if (t >= 1.0) {
                        heliState = 'unloading';
                        heliTimer = 0;
                        spawnInspectorAction();
                    }
                } 
                else if (heliState === 'unloading') {
                    helicopterGroup.position.set(0, 1.0, 0);
                    if (heliAssembly) {
                        heliAssembly.rotation.set(0, 0, 0);
                    }
                    
                    if (heliTimer >= 1.5) {
                        heliState = 'fly_away';
                        heliTimer = 0;
                    }
                } 
                else if (heliState === 'fly_away') {
                    const duration = 4.0;
                    const t = Math.min(1.0, heliTimer / duration);
                    const smoothT = t * t * (3 - 2 * t);
                    
                    helicopterGroup.position.lerpVectors(
                        new THREE.Vector3(0, 1.0, 0),
                        new THREE.Vector3(-80, 50, -80),
                        smoothT
                    );
                    
                    if (heliAssembly) {
                        heliAssembly.rotation.x = 0.25 * smoothT;
                        heliAssembly.rotation.z = -0.3 * smoothT;
                    }
                    helicopterGroup.lookAt(-80, 50, -80);
                    
                    if (t >= 1.0) {
                        scene.remove(helicopterGroup);
                        heliState = 'none';
                    }
                }

                if (rotor) {
                    rotor.rotation.y -= 0.6 * rotorSpeedMultiplier;
                }
                if (tailRotor) {
                    tailRotor.rotation.x -= 0.8 * tailRotorSpeedMultiplier;
                }
            }

            if (controls.isLocked || isTouchDevice) {

                // Apply gravity
                velocity.y -= 9.8 * 2.5 * delta;

                // Friction
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                let moveZ = Number(moveState.forward) - Number(moveState.backward);
                let moveX = Number(moveState.right) - Number(moveState.left);

                if (joystickActive) {
                    moveZ = -joystickDir.z;
                    moveX = joystickDir.x;
                }

                direction.set(moveX, 0, moveZ);
                if (direction.length() > 1) direction.normalize();

                const forwardVec = new THREE.Vector3();
                camera.getWorldDirection(forwardVec);
                forwardVec.y = 0;
                forwardVec.normalize();

                const rightVec = new THREE.Vector3();
                rightVec.crossVectors(forwardVec, camera.up).normalize();

                const speed = 150.0;

                velocity.addScaledVector(forwardVec, direction.z * speed * delta);
                velocity.addScaledVector(rightVec, direction.x * speed * delta);

                // Calculate requested translation amounts
                const dx = velocity.x * delta;
                const dy = velocity.y * delta;
                const dz = velocity.z * delta;

                // 1. Apply Y-axis movement (Jumping/Falling)
                camera.position.y += dy;

                if (camera.position.y < 1.6) {
                    velocity.y = 0;
                    camera.position.y = 1.6;
                    canJump = true;
                }

                // 2. Apply X-axis movement with collision check
                if (!isColliding(camera.position.x + dx, camera.position.z, camera.position.y)) {
                    camera.position.x += dx;
                } else {
                    velocity.x = 0; // Stop X momentum on hit
                }

                // 3. Apply Z-axis movement with collision check
                if (!isColliding(camera.position.x, camera.position.z + dz, camera.position.y)) {
                    camera.position.z += dz;
                } else {
                    velocity.z = 0; // Stop Z momentum on hit
                }

                // Boundary Check
                camera.position.x = Math.max(-mapBound, Math.min(mapBound, camera.position.x));
                camera.position.z = Math.max(-mapBound, Math.min(mapBound, camera.position.z));
            }

            // Shovel swing & walk bob animation
            if (shovel) {
                let bobX = 0;
                let bobY = 0;
                let bobZ = 0;

                // Apply walk bobbing when player is moving
                const isMoving = moveState.forward || moveState.backward || moveState.left || moveState.right || joystickActive;
                if (isMoving && (controls.isLocked || isTouchDevice)) {
                    const bobSpeed = 10;
                    bobX = Math.sin(time * 0.005 * bobSpeed) * 0.015;
                    bobY = Math.cos(time * 0.01 * bobSpeed) * 0.012;
                    bobZ = Math.sin(time * 0.005 * bobSpeed) * 0.01;
                }

                const basePos = { x: 0.18, y: -0.20, z: -0.52 };
                const baseRot = { x: -0.15, y: -0.55, z: 0.4 };

                if (shovelSwingProgress < 1.0) {
                    shovelSwingProgress += delta * 2.8; // Duration: ~0.35s
                    if (shovelSwingProgress > 1.0) shovelSwingProgress = 1.0;

                    const t = shovelSwingProgress;
                    let xOffset = 0;
                    let yOffset = 0;
                    let zOffset = 0;
                    let rx = baseRot.x;
                    let ry = baseRot.y;
                    let rz = baseRot.z;

                    if (swingType === 'overhand') {
                        // Overhand swing (vertical overhead chop)
                        if (t < 0.3) {
                            // Wind up: Raise shovel up and tilt backward
                            const p = t / 0.3;
                            xOffset = -0.05 * p;
                            yOffset = 0.35 * p;
                            zOffset = 0.05 * p;
                            rx = baseRot.x - 1.2 * p;
                            ry = baseRot.y - 0.1 * p;
                            rz = baseRot.z - 0.4 * p;
                        } else if (t < 0.6) {
                            // Strike: Chop down fast and forward
                            const p = (t - 0.3) / 0.3;
                            xOffset = -0.05 + 0.05 * p;
                            yOffset = 0.35 - 0.75 * p;
                            zOffset = 0.05 - 0.35 * p;
                            rx = (baseRot.x - 1.2) + 2.2 * p;
                            ry = (baseRot.y - 0.1) + 0.3 * p;
                            rz = (baseRot.z - 0.4) + 0.6 * p;
                        } else {
                            // Recover: Return to base position
                            const p = (t - 0.6) / 0.4;
                            const ease = Math.sin(p * Math.PI / 2);
                            yOffset = -0.4 * (1 - ease);
                            zOffset = -0.3 * (1 - ease);
                            rx = (baseRot.x + 1.0) - 1.0 * ease;
                            ry = (baseRot.y + 0.2) - 0.2 * ease;
                            rz = (baseRot.z + 0.2) - 0.2 * ease;
                        }
                    } else {
                        // Dig animation
                        if (t < 0.2) {
                            // 1. Rapidly stick into the ground
                            const p = t / 0.2;
                            yOffset = -0.4 * p;
                            zOffset = -0.15 * p;
                            rx = baseRot.x - 0.9 * p;
                            ry = baseRot.y + 0.15 * p;
                            rz = baseRot.z - 0.2 * p;
                        } else if (t < 0.75) {
                            // 2. Swing it around (wiggle/dig)
                            const p = (t - 0.2) / 0.55;
                            yOffset = -0.4;
                            zOffset = -0.15;
                            rx = (baseRot.x - 0.9) + Math.sin(p * Math.PI * 3) * 0.15;
                            ry = (baseRot.y + 0.15) + Math.sin(p * Math.PI * 2) * 0.6;
                            rz = (baseRot.z - 0.2) + Math.cos(p * Math.PI * 2) * 0.3;
                        } else {
                            // 3. Pull it out
                            const p = (t - 0.75) / 0.25;
                            const ease = Math.sin(p * Math.PI / 2);
                            yOffset = -0.4 * (1 - ease);
                            zOffset = -0.15 * (1 - ease);
                            rx = (baseRot.x - 0.9) + 0.9 * ease;
                            ry = (baseRot.y + 0.15) - 0.15 * ease;
                            rz = (baseRot.z - 0.2) + 0.2 * ease;
                        }
                    }

                    shovel.position.set(basePos.x + bobX + xOffset, basePos.y + bobY + yOffset, basePos.z + bobZ + zOffset);
                    shovel.rotation.set(rx, ry, rz);
                } else {
                    // Default held position with walk bobbing
                    shovel.position.set(basePos.x + bobX, basePos.y + bobY, basePos.z + bobZ);
                    shovel.rotation.set(baseRot.x, baseRot.y + bobX * 2, baseRot.z);
                }
            }

            // Inspector AI, movement, and collision updates
            if (inspector) {
                const toPlayer = camera.position.clone().sub(inspector.position);
                toPlayer.y = 0;
                const distToPlayer = toPlayer.length();
                toPlayer.normalize();

                inspector.lookAt(camera.position.x, inspector.position.y, camera.position.z);

                if (distToPlayer > 0.8) {
                    inspector.position.addScaledVector(toPlayer, inspectorSpeed * delta);
                }

                inspector.position.x = Math.max(-mapBound, Math.min(mapBound, inspector.position.x));
                inspector.position.z = Math.max(-mapBound, Math.min(mapBound, inspector.position.z));

                if (distToPlayer < 1.3) {
                    if (inspectorHitCooldown <= 0) {
                        inspectorHitCooldown = 1.5;

                        velocity.y = 4.0;

                        const pushDir = camera.position.clone().sub(inspector.position);
                        pushDir.y = 0;
                        pushDir.normalize();
                        velocity.x = pushDir.x * 25.0;
                        velocity.z = pushDir.z * 25.0;

                        const flashOverlay = document.getElementById('flash-overlay');
                        if (flashOverlay) {
                            flashOverlay.style.transition = 'none';
                            flashOverlay.style.opacity = '0.7';
                            flashOverlay.offsetHeight;
                            flashOverlay.style.transition = 'opacity 0.8s ease-out';
                            flashOverlay.style.opacity = '0';
                        }
                    }
                }

                if (inspectorHitCooldown > 0) {
                    inspectorHitCooldown -= delta;
                }
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
