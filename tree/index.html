<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Planting Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background-color: #1a1512;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f5f0eb;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 21, 18, 0.7);
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .card {
            background: rgba(45, 38, 34, 0.85);
            border: 1px solid rgba(224, 180, 140, 0.2);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(224, 180, 140, 0.4);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #e0b48c;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #d5c8be;
        }

        .controls-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 35px;
            text-align: left;
        }

        .control-item {
            background: rgba(20, 17, 15, 0.5);
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 3px solid #e0b48c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .key {
            background: #e0b48c;
            color: #1a1512;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        button {
            background: linear-gradient(135deg, #e0b48c, #c69469);
            color: #1a1512;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(224, 180, 140, 0.3);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(224, 180, 140, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(245, 240, 235, 0.6);
        }

        #crosshair::before {
            top: 4px;
            left: 0;
            width: 10px;
            height: 2px;
        }

        #crosshair::after {
            top: 0;
            left: 4px;
            width: 2px;
            height: 10px;
        }

        #instructions-mini {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(45, 38, 34, 0.7);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(224, 180, 140, 0.15);
            font-size: 0.85rem;
            color: #d5c8be;
            z-index: 5;
            pointer-events: none;
            letter-spacing: 0.5px;
            display: none;
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>

    <div id="crosshair"></div>
    <div id="instructions-mini">Press ESC to unlock cursor</div>

    <!-- Import Three.js and PointerLockControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // PointerLockControls implementation directly inline
        class PointerLockControls {
            constructor(camera, domElement) {
                this.camera = camera;
                this.domElement = domElement || document.body;
                this.isLocked = false;

                this.minPolarAngle = 0; // radians
                this.maxPolarAngle = Math.PI; // radians

                this.changeEvent = { type: 'change' };
                this.lockEvent = { type: 'lock' };
                this.unlockEvent = { type: 'unlock' };

                this.euler = new THREE.Euler(0, 0, 0, 'YXZ');

                this.onMouseMove = this.onMouseMove.bind(this);
                this.onPointerlockChange = this.onPointerlockChange.bind(this);
                this.onPointerlockError = this.onPointerlockError.bind(this);

                this.connect();
            }

            onMouseMove(event) {
                if (this.isLocked === false) return;

                const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
                const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;

                this.euler.setFromQuaternion(this.camera.quaternion);

                this.euler.y -= movementX * 0.002;
                this.euler.x -= movementY * 0.002;

                // Restrict looking straight up or down
                this.euler.x = Math.max(Math.PI / 2 - Math.PI + 0.01, Math.min(Math.PI / 2 - 0.01, this.euler.x));

                this.camera.quaternion.setFromEuler(this.euler);

                this.dispatchEvent(this.changeEvent);
            }

            onPointerlockChange() {
                if (this.domElement.ownerDocument.pointerLockElement === this.domElement) {
                    this.dispatchEvent(this.lockEvent);
                    this.isLocked = true;
                } else {
                    this.dispatchEvent(this.unlockEvent);
                    this.isLocked = false;
                }
            }

            onPointerlockError() {
                console.error('PointerLockControls: Unable to use Pointer Lock API');
            }

            connect() {
                this.domElement.ownerDocument.addEventListener('mousemove', this.onMouseMove);
                this.domElement.ownerDocument.addEventListener('pointerlockchange', this.onPointerlockChange);
                this.domElement.ownerDocument.addEventListener('pointerlockerror', this.onPointerlockError);
            }

            disconnect() {
                this.domElement.ownerDocument.removeEventListener('mousemove', this.onMouseMove);
                this.domElement.ownerDocument.removeEventListener('pointerlockchange', this.onPointerlockChange);
                this.domElement.ownerDocument.removeEventListener('pointerlockerror', this.onPointerlockError);
            }

            lock() {
                this.domElement.requestPointerLock();
            }

            unlock() {
                this.domElement.ownerDocument.exitPointerLock();
            }

            // Simple EventDispatcher implementation
            addEventListener(type, listener) {
                if (this._listeners === undefined) this._listeners = {};
                const listeners = this._listeners;
                if (listeners[type] === undefined) {
                    listeners[type] = [];
                }
                if (listeners[type].indexOf(listener) === -1) {
                    listeners[type].push(listener);
                }
            }

            dispatchEvent(event) {
                if (this._listeners === undefined) return;
                const listeners = this._listeners;
                const listenerArray = listeners[event.type];
                if (listenerArray !== undefined) {
                    event.target = this;
                    const array = listenerArray.slice(0);
                    for (let i = 0, l = array.length; i < l; i++) {
                        array[i].call(this, event);
                    }
                    event.target = null;
                }
            }
        }

        // --- App Setup ---
        let scene, camera, renderer, controls;
        const container = document.getElementById('canvas-container');
        const crosshair = document.getElementById('crosshair');
        const instructionsMini = document.getElementById('instructions-mini');

        // Movement variables
        const moveState = {
            forward: false,
            backward: false,
            left: false,
            right: false
        };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();
        let canJump = false;

        function init() {
            // Scene & Sky Color
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1512);
            scene.fog = new THREE.FogExp2(0x1a1512, 0.015);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6; // Average human eye level in meters

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
            hemiLight.position.set(0, 200, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffe5cc, 0.8);
            dirLight.position.set(50, 100, 50);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 100;
            dirLight.shadow.camera.bottom = -100;
            dirLight.shadow.camera.left = -100;
            dirLight.shadow.camera.right = 100;
            dirLight.shadow.camera.near = 0.1;
            dirLight.shadow.camera.far = 500;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // --- Terrain / Ground Plane ---
            // Light brown terrain: Hex #c69469 or #d2b48c (Tan/Light Brown)
            const planeSize = 1000;
            const planeGeo = new THREE.PlaneGeometry(planeSize, planeSize);
            const planeMat = new THREE.MeshStandardMaterial({
                color: 0xc69469,
                roughness: 0.8,
                metalness: 0.1
            });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.receiveShadow = true;
            scene.add(plane);

            // Grid helper on top of plane for scale perception
            const gridHelper = new THREE.GridHelper(planeSize, 200, 0x8a5b32, 0xa57548);
            gridHelper.position.y = 0.01; // Slightly above plane to prevent z-fighting
            scene.add(gridHelper);

            // --- Green Patches on the Plane ---
            const patchMat = new THREE.MeshStandardMaterial({
                color: 0x5e7c56, // Low-poly organic green patch color
                roughness: 0.9,
                metalness: 0.0
            });

            // Create flat low-poly green patches scattered on the plane
            for (let i = 0; i < 80; i++) {
                const radius = 4 + Math.random() * 16;
                const segments = 5 + Math.floor(Math.random() * 4); // 5 to 8 sides
                const patchGeo = new THREE.CircleGeometry(radius, segments);
                const patch = new THREE.Mesh(patchGeo, patchMat);

                const x = (Math.random() - 0.5) * 450;
                const z = (Math.random() - 0.5) * 450;

                patch.position.set(x, 0.005, z); // Slightly above ground plane to prevent z-fighting
                patch.rotation.x = -Math.PI / 2;
                patch.rotation.z = Math.random() * Math.PI * 2;
                patch.receiveShadow = true;
                scene.add(patch);
            }

            // Function to generate a low-poly spruce tree
            function createSpruceTree() {
                const tree = new THREE.Group();

                // Trunk
                const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 2, 5);
                const trunkMat = new THREE.MeshStandardMaterial({
                    color: 0x6e473b, // Brown trunk
                    roughness: 0.9,
                    metalness: 0.1,
                    flatShading: true
                });
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 1;
                trunk.castShadow = true;
                trunk.receiveShadow = true;
                tree.add(trunk);

                // Foliage (stacked cones)
                const foliageMat = new THREE.MeshStandardMaterial({
                    color: 0x2e4f3b, // Spruce forest green
                    roughness: 0.9,
                    metalness: 0.1,
                    flatShading: true
                });

                const coneHeights = [1.8, 1.4, 1.0];
                const coneRadii = [1.2, 0.9, 0.6];
                const coneYPositions = [2.2, 3.1, 3.8];

                for (let i = 0; i < 3; i++) {
                    const coneGeo = new THREE.ConeGeometry(coneRadii[i], coneHeights[i], 5);
                    const cone = new THREE.Mesh(coneGeo, foliageMat);
                    cone.position.y = coneYPositions[i];
                    cone.castShadow = true;
                    cone.receiveShadow = true;
                    tree.add(cone);
                }

                return tree;
            }

            // Place a few spruce trees on the map (one near spawn, others scattered)
            const treePositions = [
                { x: 10, z: -15 },
                { x: -20, z: -25 },
                { x: 30, z: 30 },
                { x: -35, z: 20 },
                { x: 50, z: -60 },
                { x: -60, z: -40 },
                { x: 80, z: 10 },
                { x: -10, z: 75 }
            ];

            treePositions.forEach(pos => {
                const tree = createSpruceTree();
                tree.position.set(pos.x, 0, pos.z);
                // Random scale variation
                const scale = 0.8 + Math.random() * 0.5;
                tree.scale.set(scale, scale, scale);
                // Random rotation
                tree.rotation.y = Math.random() * Math.PI;
                scene.add(tree);
            });

            // --- Horizontal Logs (Dark Brown and White Birch) ---
            const logGeo = new THREE.CylinderGeometry(0.2, 0.2, 3.5, 6); // Radius 0.2, Length 3.5, 6 sides (low poly)

            const darkBrownLogMat = new THREE.MeshStandardMaterial({
                color: 0x4a2c11, // Dark brown wood
                roughness: 0.9,
                metalness: 0.1,
                flatShading: true
            });
            const whiteLogMat = new THREE.MeshStandardMaterial({
                color: 0xe5e0d8, // Birch white
                roughness: 0.9,
                metalness: 0.1,
                flatShading: true
            });

            const logPositions = [
                { x: 5, z: -10, type: 'brown' },
                { x: -12, z: -18, type: 'white' },
                { x: 25, z: 20, type: 'brown' },
                { x: -28, z: 12, type: 'white' },
                { x: 42, z: -50, type: 'brown' },
                { x: -50, z: -30, type: 'white' },
                { x: 65, z: 5, type: 'brown' },
                { x: -5, z: 60, type: 'white' },
                { x: 15, z: 40, type: 'brown' },
                { x: -40, z: -5, type: 'white' }
            ];

            logPositions.forEach(pos => {
                const mat = pos.type === 'brown' ? darkBrownLogMat : whiteLogMat;
                const log = new THREE.Mesh(logGeo, mat);

                // Position on ground (y = radius)
                log.position.set(pos.x, 0.2, pos.z);

                // Lie horizontally: rotate on Z axis to lie flat, then randomly rotate on Y axis
                log.rotation.z = Math.PI / 2;
                log.rotation.y = Math.random() * Math.PI * 2;

                log.castShadow = true;
                log.receiveShadow = true;
                scene.add(log);
            });

            // Controls
            controls = new PointerLockControls(camera, renderer.domElement);

            controls.addEventListener('lock', () => {
                crosshair.style.display = 'block';
                instructionsMini.style.display = 'block';
            });

            controls.addEventListener('unlock', () => {
                crosshair.style.display = 'none';
                instructionsMini.style.display = 'none';
            });

            // Click anywhere to lock pointer and controls, or plant a tree if already locked
            document.addEventListener('click', () => {
                if (controls.isLocked) {
                    const raycaster = new THREE.Raycaster();
                    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

                    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                    const intersectionPoint = new THREE.Vector3();

                    if (raycaster.ray.intersectPlane(groundPlane, intersectionPoint)) {
                        const distance = camera.position.distanceTo(intersectionPoint);
                        if (distance < 50) {
                            const tree = createSpruceTree();
                            tree.position.copy(intersectionPoint);
                            // Make it a small tree
                            const scale = 0.2 + Math.random() * 0.1;
                            tree.scale.set(scale, scale, scale);
                            tree.rotation.y = Math.random() * Math.PI;
                            scene.add(tree);
                        }
                    }
                } else {
                    controls.lock();
                }
            });

            // Keyboard Listeners
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);

            // Start loop
            animate();
        }

        function onKeyDown(event) {
            switch (event.code) {
                case 'KeyW':
                case 'ArrowUp':
                    moveState.forward = true;
                    break;
                case 'KeyS':
                case 'ArrowDown':
                    moveState.backward = true;
                    break;
                case 'KeyA':
                case 'ArrowLeft':
                    moveState.left = true;
                    break;
                case 'KeyD':
                case 'ArrowRight':
                    moveState.right = true;
                    break;
                case 'Space':
                    if (canJump === true) {
                        velocity.y += 10.0;
                        canJump = false;
                    }
                    break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'KeyW':
                case 'ArrowUp':
                    moveState.forward = false;
                    break;
                case 'KeyS':
                case 'ArrowDown':
                    moveState.backward = false;
                    break;
                case 'KeyA':
                case 'ArrowLeft':
                    moveState.left = false;
                    break;
                case 'KeyD':
                case 'ArrowRight':
                    moveState.right = false;
                    break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();

            if (controls.isLocked === true) {
                const delta = (time - prevTime) / 1000;

                // Apply gravity
                velocity.y -= 9.8 * 2.5 * delta;

                // Friction/Deceleration
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                // Determine horizontal movement directions relative to look direction
                direction.z = Number(moveState.forward) - Number(moveState.backward);
                direction.x = Number(moveState.right) - Number(moveState.left);
                direction.normalize(); // Ensure uniform speed in all directions

                // Vector representing the forward look direction
                const forwardVec = new THREE.Vector3();
                camera.getWorldDirection(forwardVec);

                // Project look direction onto the XZ horizontal plane and normalize
                forwardVec.y = 0;
                forwardVec.normalize();

                // Vector representing the right direction (perpendicular to horizontal forward)
                const rightVec = new THREE.Vector3();
                rightVec.crossVectors(forwardVec, camera.up).normalize();

                // Apply movement forces
                const speed = 150.0;
                if (moveState.forward || moveState.backward) {
                    velocity.addScaledVector(forwardVec, direction.z * speed * delta);
                }
                if (moveState.left || moveState.right) {
                    // Note: direction.x is right (+) or left (-).
                    // rightVec is right (+), so we add scaled rightVec.
                    velocity.addScaledVector(rightVec, direction.x * speed * delta);
                }

                // Update positions
                camera.position.addScaledVector(velocity, delta);

                // Ground collision & jump reset
                if (camera.position.y < 1.6) {
                    velocity.y = 0;
                    camera.position.y = 1.6;
                    canJump = true;
                }

                // Boundary check (keep on the plane)
                const bound = 490;
                camera.position.x = Math.max(-bound, Math.min(bound, camera.position.x));
                camera.position.z = Math.max(-bound, Math.min(bound, camera.position.z));
            }

            prevTime = time;

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>

</html>
